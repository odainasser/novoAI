<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <link rel="icon" href="data:," />
    <script src="lib/tailwindcss/tailwind.js"></script>
    <link rel="stylesheet" href="lib/bootstrap-icons/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="Web.styles.css" />

    <style>
        /* Simple full-page preloader centered spinner shown before Blazor loads */
        .page-loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            z-index: 9999;
        }

        .page-loader .spinner {
            width: 48px;
            height: 48px;
            border: 6px solid #E5E7EB;
            /* gray-200 */
            border-top-color: #38B6FF;
            /* theme accent */
            border-radius: 50%;
            animation: bf-spin 0.9s linear infinite;
        }

        @keyframes bf-spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Hide Blazor's default error UI */
        #blazor-error-ui {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="page-loader" role="status" aria-label="Loading">
            <div class="spinner" aria-hidden="true"></div>
        </div>
    </div>
    <div id="blazor-error-ui">
        An error has occurred. This application may no longer respond until reloaded.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">×</a>
    </div>
    <script src="js/app-utils.js"></script>
    <script src="js/cashier-offline.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
